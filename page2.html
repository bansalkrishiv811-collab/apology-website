<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Last chance for ur cutie??</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>
/* PASSWORD SCREEN */
#lockScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
color:white;
font-family:'Poppins',sans-serif;
text-align:center;
overflow:hidden;
}

#lockPhoto{
position:absolute;
width:200px;
border-radius:20px;
filter:blur(4px);
opacity:0.35;
animation:floatPhoto 6s ease-in-out infinite;
}

@keyframes floatPhoto{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

#lockBox{
background:rgba(0,0,0,0.45);
padding:30px;
border-radius:20px;
backdrop-filter:blur(8px);
box-shadow:0 0 40px rgba(0,0,0,0.4);
width: 80%;
max-width: 320px;
}

#lockBox input{
padding:12px;
font-size:16px;
border-radius:10px;
border:none;
margin-top:10px;
width:90%;
text-align:center;
}

#lockBox button{
margin-top:15px;
padding:10px 25px;
border:none;
background:white;
color:#ff4d6d;
font-weight:600;
border-radius:10px;
cursor:pointer;
}

/* MAIN PAGE */
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
color:white;
overflow:hidden;
background-image:url("Sorry.jpg");
background-size:cover;
background-position:center;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.65));
z-index:-1;
}

.container{
text-align:center;
width:90%;
max-width:700px;
z-index: 10;
}

#topGif{
width:220px;
border-radius:14px;
margin-bottom:20px;
}

h1{
font-size:28px;
margin-bottom:10px;
text-shadow:0 0 12px black;
min-height: 40px;
}

.subtitle{
font-size:16px;
margin-bottom:40px;
opacity:0.9;
}

/* BUTTONS */
.btn-wrapper {
    position: relative;
    height: 150px;
    width: 100%;
}

button.main-btn {
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    width: 160px;
    height: 55px;
    cursor: pointer;
    transition: transform 0.2s;
}

#hellBtn{
    background:#ff3b3b;
    color:white;
    position: fixed; /* Fixed to allow free roaming across screen */
    left: 20%;
    top: 70%;
    z-index: 100;
    touch-action: none; /* Prevents scrolling when touching button */
}

#hmmBtn{
    background:#ff7ad9;
    color:white;
    position: fixed;
    right: 20%;
    top: 70%;
    z-index: 90;
}

/* FINAL SCREEN */
#finalScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);
opacity:0;
pointer-events:none;
transition:1s;
z-index: 1000;
}

.sparkle{
position:absolute;
pointer-events:none;
animation:spark 0.8s forwards;
}

@keyframes spark{
from{opacity:1;transform:scale(1);}
to{opacity:0;transform:scale(2);}
}

.shake{ animation:shake 0.4s; }
@keyframes shake{
0%,100%{transform:translateX(0)}
25%{transform:translateX(-8px)}
50%{transform:translateX(8px)}
75%{transform:translateX(-8px)}
}

.heart{ position:absolute; bottom:-50px; animation:floatUp 4s linear forwards; }
@keyframes floatUp{ to{transform:translateY(-120vh);opacity:0;} }
</style>
</head>

<body>

<div id="lockScreen">
    <img id="lockPhoto" src="MV1.png">
    <div id="lockBox">
        <h2>Only for you ❤️</h2>
        <p>What nickname did you give me first?</p>
        <input type="password" id="lockPass" placeholder="Password">
        <br>
        <button onclick="unlockSite()">Open</button>
        <p id="lockError" style="color:#ffdede; font-size:14px; margin-top:10px;"></p>
    </div>
</div>

<div class="container">
    <video id="topGif" autoplay muted loop playsinline>
        <source src="Ham1.mp4" type="video/mp4">
    </video>
    <h1 id="title"></h1>
    <p class="subtitle">I know I messed up badly… but I'm still hoping you'll hear your cutie out, plsssss...</p>
    <div class="btn-wrapper">
        <button id="hellBtn" class="main-btn">You don't deserve</button>
        <button id="hmmBtn" class="main-btn">HMM...</button>
    </div>
</div>

<div id="finalScreen">
    <h2 id="finalText" style="text-align:center; padding: 20px;"></h2>
    <div id="countdown" style="font-size:60px"></div>
</div>

<audio id="bgMusic"><source src="Iss Tarah.mp3" type="audio/mpeg"></audio>

<script>
let music = document.getElementById("bgMusic");
let hellBtn = document.getElementById("hellBtn");
let hmmBtn = document.getElementById("hmmBtn");
let hmmScale = 1;

/* 1. PASSWORD LOGIC */
function unlockSite(){
    let pass = document.getElementById("lockPass").value;
    if(pass === "Hamster"){
        document.getElementById("lockScreen").style.display = "none";
        music.currentTime = 170;
        music.volume = 0.6;
        music.play();
        typeTitle();
    } else {
        document.getElementById("lockError").innerText = "That's not it... try again?";
        document.getElementById("lockBox").classList.add("shake");
        setTimeout(()=>document.getElementById("lockBox").classList.remove("shake"), 400);
    }
}

/* 2. ROAMING BUTTON LOGIC */
function roam() {
    // Keep button within screen bounds with 20px padding
    const padding = 20;
    const maxX = window.innerWidth - hellBtn.offsetWidth - padding;
    const maxY = window.innerHeight - hellBtn.offsetHeight - padding;

    const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
    const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

    hellBtn.style.left = randomX + "px";
    hellBtn.style.top = randomY + "px";

    // Growth logic for the 'Yes' button
    hmmScale += 0.12;
    hmmBtn.style.transform = `scale(${hmmScale})`;
    
    if(hmmScale > 1.6) {
        hmmBtn.innerText = "Okay, I'll listen ❤️";
    }
}

// Hover for Desktop
hellBtn.addEventListener("mouseover", roam);

// Touch for Mobile (triggers roam before click happens)
hellBtn.addEventListener("touchstart", function(e) {
    e.preventDefault(); 
    roam();
});

/* 3. FINAL ACTION */
hmmBtn.onclick = () => {
    document.getElementById("finalScreen").style.opacity = "1";
    document.getElementById("finalScreen").style.pointerEvents = "all";
    
    let text = "Thank you for listening ❤️";
    let i = 0;
    function typeFinal() {
        if(i < text.length) {
            document.getElementById("finalText").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeFinal, 60);
        }
    }
    typeFinal();
    
    let count = 3;
    let cd = document.getElementById("countdown");
    cd.innerText = count;
    let timer = setInterval(() => {
        count--;
        if(count > 0) cd.innerText = count;
        else {
            cd.innerText = "❤️";
            clearInterval(timer);
            setTimeout(() => { window.location.href = "page3.html"; }, 1000);
        }
    }, 1000);
};

/* 4. TYPING EFFECT */
function typeTitle() {
    let text = "Can I get one last chance, maalkin?";
    let i = 0;
    function typing() {
        if(i < text.length) {
            document.getElementById("title").innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 70);
        }
    }
    typing();
}

/* 5. VISUAL EFFECTS */
document.addEventListener("mousemove", (e) => {
    let spark = document.createElement("div");
    spark.className = "sparkle";
    spark.innerHTML = "✨";
    spark.style.left = e.pageX + "px";
    spark.style.top = e.pageY + "px";
    document.body.appendChild(spark);
    setTimeout(() => spark.remove(), 800);
});

setInterval(() => {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 4000);
}, 400);
</script>

</body>
</html>
