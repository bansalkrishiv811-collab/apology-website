<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Computer Science Project</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

/* ---------------- NORMAL PROJECT PAGE ---------------- */

#projectPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
z-index:999999;
}

.projectBox{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
text-align:center;
max-width:400px;
}

.projectBox h2{
margin-bottom:10px;
}

.projectBox button{
padding:10px 25px;
border:none;
border-radius:8px;
background:#3a7afe;
color:white;
font-size:16px;
cursor:pointer;
}

/* ---------------- PASSWORD SCREEN ---------------- */

#lockScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
color:white;
font-family:'Poppins',sans-serif;
text-align:center;
overflow:hidden;
}

#lockPhoto{
position:absolute;
width:240px;
border-radius:20px;
filter:blur(4px);
opacity:0.35;
animation:floatPhoto 6s ease-in-out infinite;
}

@keyframes floatPhoto{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

#lockBox{
background:rgba(0,0,0,0.45);
padding:40px;
border-radius:20px;
backdrop-filter:blur(8px);
box-shadow:0 0 40px rgba(0,0,0,0.4);
animation:glow 2s ease-in-out infinite;
}

@keyframes glow{
0%{box-shadow:0 0 20px rgba(255,255,255,0.2);}
50%{box-shadow:0 0 40px rgba(255,100,150,0.8);}
100%{box-shadow:0 0 20px rgba(255,255,255,0.2);}
}

#lockBox input{
padding:12px;
font-size:16px;
border-radius:10px;
border:none;
margin-top:10px;
width:220px;
text-align:center;
}

#lockBox button{
margin-top:15px;
padding:10px 25px;
border:none;
background:white;
color:#ff4d6d;
font-weight:600;
border-radius:10px;
cursor:pointer;
}

#lockError{
margin-top:10px;
color:#ffdede;
font-size:14px;
}

#hint{
font-size:13px;
opacity:0.85;
}

/* ---------------- MAIN PAGE ---------------- */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
color:white;
overflow:hidden;
background-image:url("Sorry.jpg");
background-size:cover;
background-position:center;
cursor:none;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.65));
z-index:-1;
}

.container{
text-align:center;
max-width:700px;
}

#topGif{
width:260px;
border-radius:14px;
margin-bottom:20px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0px);}
}

h1{
font-size:36px;
margin-bottom:10px;
text-shadow:0 0 12px black;
}

.subtitle{
font-size:18px;
margin-bottom:40px;
opacity:0.9;
}

.buttons{
position:relative;
width:500px;
height:120px;
margin:auto;
}

button{
border:none;
border-radius:14px;
font-size:18px;
font-weight:600;
letter-spacing:1px;
width:230px;
height:65px;
cursor:pointer;
transition:0.25s;
}

#hellBtn{
background:#ff3b3b;
color:white;
position:absolute;
left:0;
top:20px;
}

#hmmBtn{
background:#ff7ad9;
color:white;
position:absolute;
right:0;
top:20px;
}

/* ---------------- FINAL SCREEN ---------------- */

#finalScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(8px);
opacity:0;
pointer-events:none;
transition:1s;
}

#finalText{
font-size:42px;
margin-bottom:20px;
}

#countdown{
font-size:60px;
}

</style>
</head>

<body>

<!-- NORMAL PROJECT PAGE -->

<div id="projectPage">

<div class="projectBox">

<h2>Computer Science Project</h2>

<p>Topic: Interactive Web Design</p>

<p>Click below to open the project presentation.</p>

<button onclick="openProject()">Open Project</button>

</div>

</div>

<!-- PASSWORD SCREEN -->

<div id="lockScreen">

<img id="lockPhoto" src="MV1.png">

<div id="lockBox">

<h2>These pages are only for you ❤️</h2>

<p>What nickname did you give me first?</p>

<input type="password" id="lockPass" placeholder="Password">

<br>

<button onclick="unlockSite()">Open</button>

<br>

<button onclick="showHint()" style="background:#ff8ab5;color:white">
Need a hint?
</button>

<p id="hint"></p>

<div id="lockError"></div>

</div>

</div>

<!-- AUDIO -->

<audio id="unlockSound">
<source src="unlock.mp3" type="audio/mpeg">
</audio>

<audio id="correctVoice">
<source src="correct.mpeg" type="audio/mpeg">
</audio>

<audio id="wrongVoice">
<source src="wrong.mpeg" type="audio/mpeg">
</audio>

<audio id="bgMusic">
<source src="Iss Tarah.mp3" type="audio/mpeg">
</audio>

<!-- MAIN PAGE -->

<div class="container">

<video id="topGif" autoplay muted loop>
<source src="Ham1.mp4" type="video/mp4">
</video>

<h1 id="title"></h1>

<p class="subtitle">
I know I messed up badly… but I'm still hoping you'll hear your cutie out.
</p>

<div class="buttons">
<button id="hellBtn">You don't deserve</button>
<button id="hmmBtn">HMM...</button>
</div>

</div>

<div id="finalScreen">
<h2 id="finalText"></h2>
<div id="countdown"></div>
</div>

<script>

/* OPEN NORMAL PAGE */

function openProject(){

document.getElementById("projectPage").style.display="none";
document.getElementById("lockScreen").style.display="flex";

}

/* PASSWORD SYSTEM */

let wrongAttempts=0;
let music=document.getElementById("bgMusic");

function unlockSite(){

let pass=document.getElementById("lockPass").value;

if(pass==="Hamster"){

document.getElementById("unlockSound").play();
document.getElementById("correctVoice").play();

let screen=document.getElementById("lockScreen");

screen.style.display="none";

music.currentTime=170;
music.volume=0.7;
music.play();

}else{

wrongAttempts++;

document.getElementById("wrongVoice").play();

let error=document.getElementById("lockError");

error.innerText="Hmm... that doesn't seem right";

}

}

function showHint(){

document.getElementById("hint").innerText="It's an animal.. first letter is capital";

}

/* TITLE TYPING */

function typeTitle(){

let text="Can I get one last chance, maalkin";
let i=0;

function typing(){
if(i<text.length){
document.getElementById("title").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,70);
}
}

typing();

}

typeTitle();

/* BUTTON LOGIC */

let hellBtn=document.getElementById("hellBtn");
let hmmBtn=document.getElementById("hmmBtn");
let finalScreen=document.getElementById("finalScreen");
let finalText=document.getElementById("finalText");
let countdown=document.getElementById("countdown");

let accepted=false;

hmmBtn.onclick=()=>{

accepted=true;

finalScreen.style.opacity=1;
finalScreen.style.pointerEvents="all";

typeText("Thank you for listening ❤️");

startCountdown();

};

function typeText(text){

let i=0;

function typing(){
if(i<text.length){
finalText.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,60);
}
}

typing();

}

function startCountdown(){

let count=3;

countdown.innerHTML=count;

let interval=setInterval(()=>{

count--;

if(count>0){
countdown.innerHTML=count;
}
else{
countdown.innerHTML="❤️";
clearInterval(interval);
window.location.href="page2.html";
}

},1000);

}

</script>

</body>
</html>
