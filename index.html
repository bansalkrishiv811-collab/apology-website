<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Mathematics Class XII Question Practice</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

/* FIRST NORMAL PAGE */

#projectPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
z-index:100000;
}

.projectBox{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
text-align:center;
width:320px;
color:black;
}

.projectBox input{
padding:10px;
width:80%;
margin-top:10px;
color:black;
}

.projectBox button{
margin-top:15px;
padding:10px 20px;
cursor:pointer;
background:#2e7dff;
color:white;
border:none;
border-radius:8px;
}

/* SECOND PASSWORD SCREEN */

#lockScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
color:white;
font-family:'Poppins',sans-serif;
text-align:center;
overflow:hidden;
}

#lockPhoto{
position:absolute;
width:240px;
border-radius:20px;
filter:blur(4px);
opacity:0.35;
animation:floatPhoto 6s ease-in-out infinite;
}

@keyframes floatPhoto{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

#lockBox{
background:rgba(0,0,0,0.45);
padding:40px;
border-radius:20px;
backdrop-filter:blur(8px);
box-shadow:0 0 40px rgba(0,0,0,0.4);
}

#lockBox input{
padding:12px;
font-size:16px;
border-radius:10px;
border:none;
margin-top:10px;
width:220px;
text-align:center;
}

/* MAIN PAGE */

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
color:white;
overflow:hidden;
background-image:url("Sorry.jpg");
background-size:cover;
background-position:center;
cursor:none;
}

.container{
text-align:center;
max-width:700px;
}

#topGif{
width:260px;
border-radius:14px;
margin-bottom:20px;
}

.buttons{
position:relative;
width:500px;
height:120px;
margin:auto;
}

button{
border:none;
border-radius:14px;
font-size:18px;
font-weight:600;
letter-spacing:1px;
width:230px;
height:65px;
cursor:pointer;
transition:0.25s;
}

#hellBtn{
background:#ff3b3b;
color:white;
position:absolute;
left:0;
top:20px;
}

#hmmBtn{
background:#ff7ad9;
color:white;
position:absolute;
right:0;
top:20px;
}

</style>
</head>

<body>

<!-- FIRST PASSWORD PAGE -->

<div id="projectPage">

<div class="projectBox">

<h2>Mathematics Class XII Question Practice</h2>

<p>Type my name below to open it</p>

<input type="password" id="projectPass" placeholder="Enter password">

<br>

<button onclick="checkProjectPass()">Open Project</button>

</div>

</div>

<!-- SECOND PASSWORD PAGE -->

<div id="lockScreen">

<img id="lockPhoto" src="MV1.png">

<div id="lockBox">

<h2>These pages are only for you ❤️</h2>

<p>What nickname did you give me first?</p>

<input type="password" id="lockPass" placeholder="Password">

<br>

<button onclick="unlockSite()">Open</button>

<p id="lockError"></p>

</div>

</div>

<!-- MUSIC -->

<audio id="bgMusic">
<source src="Iss Tarah.mp3" type="audio/mpeg">
</audio>

<!-- MAIN PAGE -->

<div class="container">

<video id="topGif" autoplay muted loop>
<source src="Ham1.mp4" type="video/mp4">
</video>

<h1 id="title"></h1>

<p class="subtitle">
I know I messed up badly… but I'm still hoping you'll hear your cutie out.
</p>

<div class="buttons">
<button id="hellBtn">You don't deserve</button>
<button id="hmmBtn">HMM...</button>
</div>

</div>

<script>

/* FIRST PAGE PASSWORD */

function checkProjectPass(){

let pass=document.getElementById("projectPass").value;

if(pass==="Krishiv"){

document.getElementById("projectPage").style.display="none";
document.getElementById("lockScreen").style.display="flex";

}else{

window.location.href="https://static.qumath.in/static/website/old-cdn-static/ncert-solutions/ncert-books-for-class-12-maths.pdf";

}

}

/* SECOND PASSWORD */

let music=document.getElementById("bgMusic");

function unlockSite(){

let pass=document.getElementById("lockPass").value;

if(pass==="Hamster"){

document.getElementById("lockScreen").style.display="none";

music.currentTime=170;
music.play();

}else{

document.getElementById("lockError").innerText="Hmm... that doesn't seem right";

}

}

/* TITLE TYPING */

function typeTitle(){

let text="Can I get one last chance, maalkin";
let i=0;

function typing(){

if(i<text.length){
document.getElementById("title").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,70);
}

}

typing();

}

typeTitle();

/* MOVING BUTTON */

let hellBtn=document.getElementById("hellBtn");
let hmmBtn=document.getElementById("hmmBtn");

function moveHellButton(){

let x=Math.random()*(window.innerWidth-200);
let y=Math.random()*(window.innerHeight-100);

hellBtn.style.left=x+"px";
hellBtn.style.top=y+"px";

}

document.addEventListener("mousemove",(e)=>{

const rect=hellBtn.getBoundingClientRect();

const dx=e.clientX-(rect.left+rect.width/2);
const dy=e.clientY-(rect.top+rect.height/2);

const distance=Math.sqrt(dx*dx+dy*dy);

if(distance<140){
moveHellButton();
}

});

/* HMM BUTTON */

hmmBtn.onclick=()=>{

window.location.href="page2.html";

}

</script>

</body>
</html>
