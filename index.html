<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Interactive Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:#0f172a;
color:white;
cursor:url("https://cur.cursors-4u.net/nature/nat-10/nat927.cur"), auto;
}

/* animated stars */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
animation:stars 60s linear infinite;
opacity:0.2;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

.container{
text-align:center;
padding:30px;
}

h1{
margin-bottom:30px;
font-size:32px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.2s;
position:relative;
}

#yes{
background:#22c55e;
color:white;
margin-right:10px;
}

#no{
background:#ef4444;
color:white;
position:absolute;
}

.message{
margin-top:30px;
font-size:22px;
min-height:30px;
}

/* mobile */

@media(max-width:600px){

h1{
font-size:24px;
}

button{
padding:12px 20px;
font-size:16px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Do you like this page? ❤️</h1>

<button id="yes">Yes</button>
<button id="no">No</button>

<div class="message" id="message"></div>

</div>

<script>

const noBtn = document.getElementById("no")
const yesBtn = document.getElementById("yes")
const message = document.getElementById("message")

/* dodge button */

noBtn.addEventListener("mouseover", () => {

const x = Math.random() * (window.innerWidth - 100)
const y = Math.random() * (window.innerHeight - 50)

noBtn.style.left = x + "px"
noBtn.style.top = y + "px"

})

/* typing message */

yesBtn.onclick = () => {

const text = "💌 Aww thanks! You just unlocked the secret message: You're awesome!"
let i = 0
message.innerHTML = ""

function type(){

if(i < text.length){
message.innerHTML += text.charAt(i)
i++
setTimeout(type,40)
}

}

type()

}

</script>

</body>
</html>
