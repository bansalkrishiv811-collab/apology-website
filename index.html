<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Last chance??</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
font-family:'Poppins',sans-serif;
color:white;

background-image:url("Sorry.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

cursor:none;
animation:fadeIn 2s ease;
}

/* overlay */

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.65));
z-index:-1;
}

/* GIF video */

#topGif{
width:260px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

/* title */

h1{
margin-bottom:10px;
text-shadow:0 0 12px black;
font-size:36px;
}

/* subtitle */

.subtitle{
max-width:600px;
text-align:center;
font-size:18px;
opacity:0.9;
margin-bottom:40px;
text-shadow:0 0 8px black;
}

/* buttons */

button{
border:none;
border-radius:14px;
font-size:18px;
cursor:pointer;
transition:0.2s;
font-family:'Poppins',sans-serif;
font-weight:600;
letter-spacing:1px;

width:240px;
height:70px;

display:flex;
align-items:center;
justify-content:center;

animation:pulse 2s infinite;
}

#hellBtn{
background:#ff3b3b;
color:white;
position:absolute;
left:50%;
top:60%;
transform:translate(-50%,-50%);
}

#hmmBtn{
background:#ff7ad9;
color:white;
position:absolute;
left:50%;
top:75%;
transform:translate(-50%,-50%);
}

/* pulse */

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(255,255,255,0.4);}
70%{box-shadow:0 0 0 18px rgba(255,255,255,0);}
100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}
}

/* fade */

@keyframes fadeIn{
from{opacity:0;transform:scale(1.05);}
to{opacity:1;transform:scale(1);}
}

/* hearts */

.heart{
position:absolute;
bottom:-50px;
animation:floatUp linear forwards;
}

@keyframes floatUp{
from{transform:translateY(0) scale(1);opacity:1;}
to{transform:translateY(-120vh) scale(2);opacity:0;}
}

/* confetti */

.confetti{
position:absolute;
width:10px;
height:10px;
animation:fall linear forwards;
}

@keyframes fall{
from{transform:translateY(-20px) rotate(0deg);}
to{transform:translateY(100vh) rotate(720deg);}
}

/* glow */

.glow{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:0.7;
animation:floatGlow linear infinite;
}

@keyframes floatGlow{
from{transform:translateY(0);opacity:0;}
50%{opacity:1;}
to{transform:translateY(-120vh);opacity:0;}
}

/* final screen */

#finalScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
opacity:0;
pointer-events:none;
transition:1s;
}

#finalScreen h2{
font-size:45px;
}

/* sparkle */

.sparkle{
position:absolute;
pointer-events:none;
font-size:16px;
animation:spark 0.8s linear forwards;
}

@keyframes spark{
from{opacity:1;transform:scale(1);}
to{opacity:0;transform:scale(2);}
}

</style>
</head>

<body>

<!-- GIF video -->
<video id="topGif" autoplay muted loop>
<source src="Ham1.mp4" type="video/mp4">
</video>

<audio id="bgMusic">
<source src="Iss Tarah.mp3" type="audio/mpeg">
</audio>

<h1 id="title"></h1>

<p class="subtitle">
I know I messed up badly… but I'm still hoping you'll hear me out.
</p>

<button id="hellBtn">You don't deserve</button>
<button id="hmmBtn">HMM...</button>

<div id="finalScreen">
<h2 id="finalText"></h2>
</div>

<script>

/* typing title */

function typeTitle(){

let text="Can I get one last chance, maalkin";
let i=0;

function typing(){
if(i<text.length){
document.getElementById("title").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,70);
}
}

typing();
}

typeTitle();

let hellBtn=document.getElementById("hellBtn");
let hmmBtn=document.getElementById("hmmBtn");
let finalScreen=document.getElementById("finalScreen");
let finalText=document.getElementById("finalText");
let music=document.getElementById("bgMusic");

let hellSize=1;
let hmmSize=1;
let accepted=false;

/* start music */

document.addEventListener("click",()=>{

music.currentTime=170;
music.volume=0.7;
music.play();

},{once:true});

/* redirect when song reaches 3:23 */

music.addEventListener("timeupdate",()=>{

if(accepted && music.currentTime>=203){
window.location.href="page2.html";
}

});

/* move button */

function moveHellButton(){

const buttonWidth=hellBtn.offsetWidth;
const buttonHeight=hellBtn.offsetHeight;

const padding=20;

const maxX=window.innerWidth-buttonWidth-padding;
const maxY=window.innerHeight-buttonHeight-padding;

let x=Math.random()*(maxX-padding)+padding;
let y=Math.random()*(maxY-padding)+padding;

hellBtn.style.left=x+"px";
hellBtn.style.top=y+"px";

}

/* dodge */

document.addEventListener("mousemove",(e)=>{

const rect=hellBtn.getBoundingClientRect();

const buttonX=rect.left+rect.width/2;
const buttonY=rect.top+rect.height/2;

const distX=e.clientX-buttonX;
const distY=e.clientY-buttonY;

const distance=Math.sqrt(distX*distX+distY*distY);

if(distance<150){

hellSize-=0.04;
hmmSize+=0.05;

if(hellSize<0.45) hellSize=0.45;

hellBtn.style.transform=`translate(-50%,-50%) scale(${hellSize})`;
hmmBtn.style.transform=`translate(-50%,-50%) scale(${hmmSize})`;

hmmBtn.innerText="Pleaseee 🥺";

moveHellButton();

}

});

/* HMM click */

hmmBtn.onclick=()=>{

accepted=true;

finalScreen.style.opacity=1;
finalScreen.style.pointerEvents="all";

heartExplosion();
confettiExplosion();
typeText("I won't disappoint you ❤️");

};

/* typing final */

function typeText(text){

let i=0;

function typing(){

if(i<text.length){
finalText.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,60);
}

}

typing();

}

/* floating hearts */

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*40)+"px";
heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,150);

/* glow */

function createGlow(){

const g=document.createElement("div");
g.classList.add("glow");

g.style.left=Math.random()*100+"vw";
g.style.animationDuration=(6+Math.random()*6)+"s";

document.body.appendChild(g);

setTimeout(()=>g.remove(),12000);

}

setInterval(createGlow,300);

/* heart explosion */

function heartExplosion(){

for(let i=0;i<200;i++){

setTimeout(()=>{

const heart=document.createElement("div");

heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(30+Math.random()*50)+"px";
heart.style.animationDuration="3s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);

},i*10)

}

}

/* confetti */

function confettiExplosion(){

for(let i=0;i<150;i++){

const confetti=document.createElement("div");

confetti.classList.add("confetti");
confetti.style.left=Math.random()*100+"vw";
confetti.style.background=`hsl(${Math.random()*360},100%,50%)`;
confetti.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(confetti);

setTimeout(()=>confetti.remove(),5000);

}

}

/* sparkle cursor */

document.addEventListener("mousemove",(e)=>{

let spark=document.createElement("div");

spark.classList.add("sparkle");
spark.innerHTML="✨";

spark.style.left=e.pageX+"px";
spark.style.top=e.pageY+"px";

document.body.appendChild(spark);

setTimeout(()=>spark.remove(),800);

});

</script>

</body>
</html>
