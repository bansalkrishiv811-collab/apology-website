<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apology pleaseee??</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
font-family:'Poppins', sans-serif;
color:white;

/* YOUR BACKGROUND IMAGE */
background-image:url("Sorry.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

h1{
margin-bottom:40px;
text-align:center;
text-shadow:0 0 10px black;
}

/* Buttons */

.buttons{
position:relative;
display:flex;
gap:40px;
}

button{
border:none;
border-radius:12px;
padding:20px 40px;
font-size:20px;
cursor:pointer;
transition:0.25s;
width:200px;
height:70px;
font-family:'Poppins', sans-serif;
font-weight:600;
letter-spacing:1px;
}

#hellBtn{
background:#ff3b3b;
color:white;
position:absolute;
}

#hmmBtn{
background:#ff7ad9;
color:white;
}

/* Floating Hearts */

.heart{
position:absolute;
bottom:-50px;
animation:floatUp linear forwards;
}

@keyframes floatUp{
from{
transform:translateY(0) scale(1);
opacity:1;
}
to{
transform:translateY(-120vh) scale(2);
opacity:0;
}
}

/* Confetti */

.confetti{
position:absolute;
width:10px;
height:10px;
animation:fall linear forwards;
}

@keyframes fall{
from{
transform:translateY(-20px) rotate(0deg);
}
to{
transform:translateY(100vh) rotate(720deg);
}
}

/* Final Screen */

#finalScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.6);
opacity:0;
pointer-events:none;
transition:1s;
}

#finalScreen h2{
font-size:45px;
text-align:center;
}

</style>
</head>

<body>

<h1>Choose one 😏</h1>

<div class="buttons">
<button id="hellBtn">GO TO HELL</button>
<button id="hmmBtn">HMM...</button>
</div>

<div id="finalScreen">
<h2>I knew you'd choose me ❤️</h2>
</div>

<script>

let hellBtn = document.getElementById("hellBtn");
let hmmBtn = document.getElementById("hmmBtn");
let finalScreen = document.getElementById("finalScreen");

let hellSize = 1;
let hmmSize = 1;

/* Keep button inside screen */

function moveHellButton(){

const buttonWidth = hellBtn.offsetWidth;
const buttonHeight = hellBtn.offsetHeight;

const maxX = window.innerWidth - buttonWidth;
const maxY = window.innerHeight - buttonHeight;

let x = Math.random() * maxX;
let y = Math.random() * maxY;

hellBtn.style.left = x + "px";
hellBtn.style.top = y + "px";

}

moveHellButton();

hellBtn.addEventListener("mouseover", () => {

hellSize -= 0.1;
hmmSize += 0.1;

if(hellSize < 0.4) hellSize = 0.4;

hellBtn.style.transform = `scale(${hellSize})`;
hmmBtn.style.transform = `scale(${hmmSize})`;

hmmBtn.innerText = "Pleaseee 🥺";

moveHellButton();

});

/* When HMM clicked */

hmmBtn.onclick = () => {

finalScreen.style.opacity = 1;
finalScreen.style.pointerEvents = "all";

heartExplosion();
confettiExplosion();

};

/* Floating hearts */

function createHeart(){

const heart = document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*40)+"px";

heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,150);

/* Heart explosion */

function heartExplosion(){

for(let i=0;i<200;i++){

setTimeout(()=>{

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(30+Math.random()*50)+"px";

heart.style.animationDuration="3s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);

},i*10)

}

}

/* Confetti */

function confettiExplosion(){

for(let i=0;i<150;i++){

const confetti=document.createElement("div");

confetti.classList.add("confetti");

confetti.style.left=Math.random()*100+"vw";

confetti.style.background=`hsl(${Math.random()*360},100%,50%)`;

confetti.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(confetti);

setTimeout(()=>confetti.remove(),5000);

}

}

</script>

</body>
</html>
