<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Last chance??</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
color:white;
overflow:hidden;

background-image:url("Sorry.jpg");
background-size:cover;
background-position:center;

cursor:none;
}

/* overlay */

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.65));
z-index:-1;
}

/* intro screen */

#intro{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
font-size:36px;
background:black;
animation:introFade 3s forwards;
}

@keyframes introFade{
0%{opacity:1;}
80%{opacity:1;}
100%{opacity:0;visibility:hidden;}
}

/* container */

.container{
text-align:center;
max-width:700px;
}

/* floating gif */

#topGif{
width:260px;
border-radius:14px;
margin-bottom:20px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0px);}
}

/* title */

h1{
font-size:36px;
margin-bottom:10px;
text-shadow:0 0 10px black;
}

/* subtitle */

.subtitle{
font-size:18px;
margin-bottom:40px;
opacity:0.9;
}

/* buttons */

.buttons{
display:flex;
gap:30px;
justify-content:center;
}

button{
border:none;
border-radius:14px;
font-size:18px;
font-weight:600;
letter-spacing:1px;
width:230px;
height:65px;
cursor:pointer;
transition:0.2s;
}

/* colors */

#hellBtn{
background:#ff3b3b;
color:white;
position:absolute;
}

#hmmBtn{
background:#ff7ad9;
color:white;
}

/* page shake */

.shake{
animation:shake 0.3s;
}

@keyframes shake{
0%{transform:translate(2px,2px);}
25%{transform:translate(-2px,2px);}
50%{transform:translate(2px,-2px);}
75%{transform:translate(-2px,-2px);}
100%{transform:translate(0,0);}
}

/* hearts */

.heart{
position:absolute;
bottom:-50px;
animation:floatUp linear forwards;
}

@keyframes floatUp{
from{transform:translateY(0);opacity:1;}
to{transform:translateY(-120vh);opacity:0;}
}

/* final screen */

#finalScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(8px);
opacity:0;
pointer-events:none;
transition:1s;
}

#finalText{
font-size:40px;
margin-bottom:20px;
}

#countdown{
font-size:60px;
}

.sparkle{
position:absolute;
pointer-events:none;
animation:spark 0.8s forwards;
}

@keyframes spark{
from{opacity:1;transform:scale(1);}
to{opacity:0;transform:scale(2);}
}

</style>
</head>

<body>

<div id="intro">I know I hurt you…</div>

<div class="container">

<video id="topGif" autoplay muted loop>
<source src="Ham1.mp4" type="video/mp4">
</video>

<audio id="bgMusic">
<source src="Iss Tarah.mp3" type="audio/mpeg">
</audio>

<h1 id="title"></h1>

<p class="subtitle">
I know I messed up badly… but I'm still hoping you'll hear me out.
</p>

<div class="buttons">
<button id="hellBtn">You don't deserve</button>
<button id="hmmBtn">HMM...</button>
</div>

</div>

<div id="finalScreen">
<h2 id="finalText"></h2>
<div id="countdown"></div>
</div>

<script>

/* typing title */

function typeTitle(){

let text="Can I get one last chance, maalkin";
let i=0;

function typing(){
if(i<text.length){
document.getElementById("title").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,70);
}
}

typing();
}

setTimeout(typeTitle,2500);

let hellBtn=document.getElementById("hellBtn");
let hmmBtn=document.getElementById("hmmBtn");
let finalScreen=document.getElementById("finalScreen");
let finalText=document.getElementById("finalText");
let countdown=document.getElementById("countdown");
let music=document.getElementById("bgMusic");

let accepted=false;

/* start music */

document.addEventListener("click",()=>{
music.currentTime=170;
music.volume=0.7;
music.play();
},{once:true});

/* redirect when song reaches 3:23 */

music.addEventListener("timeupdate",()=>{
if(accepted && music.currentTime>=203){
window.location.href="page2.html";
}
});

/* dodge button */

function moveHellButton(){

let x=Math.random()*(window.innerWidth-200);
let y=Math.random()*(window.innerHeight-100);

hellBtn.style.left=x+"px";
hellBtn.style.top=y+"px";

}

/* dodge logic */

document.addEventListener("mousemove",(e)=>{

const rect=hellBtn.getBoundingClientRect();

const dx=e.clientX-(rect.left+rect.width/2);
const dy=e.clientY-(rect.top+rect.height/2);

const distance=Math.sqrt(dx*dx+dy*dy);

if(distance<140){

document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),200);

moveHellButton();

}

});

/* HMM click */

hmmBtn.onclick=()=>{

accepted=true;

finalScreen.style.opacity=1;
finalScreen.style.pointerEvents="all";

typeText("Thank you for listening ❤️");

heartExplosion();

startCountdown();

};

/* typing */

function typeText(text){

let i=0;

function typing(){
if(i<text.length){
finalText.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,60);
}
}

typing();
}

/* countdown */

function startCountdown(){

let count=3;

countdown.innerHTML=count;

let interval=setInterval(()=>{

count--;

if(count>0){
countdown.innerHTML=count;
}
else{
countdown.innerHTML="❤️";
clearInterval(interval);
}

},1000);

}

/* floating hearts */

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*40)+"px";
heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,200);

/* heart burst */

function heartExplosion(){

for(let i=0;i<150;i++){

setTimeout(()=>{

const heart=document.createElement("div");

heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(30+Math.random()*50)+"px";
heart.style.animationDuration="3s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);

},i*8);

}

}

/* sparkle cursor */

document.addEventListener("mousemove",(e)=>{

let spark=document.createElement("div");

spark.classList.add("sparkle");
spark.innerHTML="✨";

spark.style.left=e.pageX+"px";
spark.style.top=e.pageY+"px";

document.body.appendChild(spark);

setTimeout(()=>spark.remove(),800);

});

</script>

</body>
</html>
