<!DOCTYPE html>
<html>

<head>

<title>Apology Statement from Krishiv Bansal to Madhavi Verma</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
background-image:url("Sorry.jpg");
background-size:cover;
background-position:center;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* white box */

.box{
width:90%;
max-width:500px;
padding:30px;
background:rgba(255,255,255,0.92);
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
animation:fadeIn 2s;
}

/* typewriter */

.typewriter{
overflow:hidden;
border-right:3px solid #ff6b81;
white-space:nowrap;
margin:auto;
animation:typing 3s steps(30,end), blink .8s infinite;
}

@keyframes typing{
from{width:0}
to{width:100%}
}

@keyframes blink{
0%{border-color:transparent}
50%{border-color:#ff6b81}
100%{border-color:transparent}
}

/* floating hearts */

.heart{
position:fixed;
bottom:-40px;
pointer-events:none;
animation:floatUp linear forwards;
}

@keyframes floatUp{

0%{
transform:translateY(0) scale(1);
opacity:1;
}

100%{
transform:translateY(-110vh) scale(1.6);
opacity:0;
}

}

/* fade animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* button */

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#ff6b81;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff4757;
transform:scale(1.08);
}

/* mobile */

@media (max-width:600px){

h2{
font-size:20px;
}

p{
font-size:14px;
}

button{
font-size:14px;
padding:10px 20px;
}

}

</style>

</head>

<body>

<div class="box">

<h2 class="typewriter">Hey...</h2>

<p>Before you close this page, please give me a moment.</p>

<button onclick="startLove()">Click here</button>

</div>


<!-- MUSIC -->

<audio id="bgmusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>


<script>

/* floating hearts generator */

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(25+Math.random()*40)+"px";

heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

/* increase frequency */

setInterval(createHeart,250);


/* heart explosion */

function heartBurst(){

for(let i=0;i<25;i++){

setTimeout(createHeart,i*40);

}

}


/* button click */

function startLove(){

document.getElementById("bgmusic").play();

heartBurst();

setTimeout(()=>{

location.href="page2.html";

},1200);

}

</script>

</body>
</html>
