<!DOCTYPE html>
<html>

<head>
<title>Apology Statement from Krishiv Bansal to Madhavi Verma</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
background-image:url("Sorry.jpg");
background-size:cover;
background-repeat:no-repeat;
background-position:center;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* floating hearts */

.heart{
position:absolute;
bottom:-50px;
font-size:20px;
animation:float 6s linear infinite;
color:#ff6b81;
}

@keyframes float{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-100vh) scale(1.5);
opacity:0;
}
}

/* white box */

.box{
width:90%;
max-width:500px;
padding:30px;
background:rgba(255,255,255,0.92);
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
animation:fadeIn 2s;
}

/* typewriter */

.typewriter{
overflow:hidden;
border-right:3px solid #ff6b81;
white-space:nowrap;
animation:typing 3s steps(30,end), blink .8s infinite;
margin:auto;
}

@keyframes typing{
from{width:0}
to{width:100%}
}

@keyframes blink{
0%{border-color:transparent}
50%{border-color:#ff6b81}
100%{border-color:transparent}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(50px);}
to{opacity:1; transform:translateY(0);}
}

/* button */

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#ff6b81;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff4757;
transform:scale(1.08);
}

/* mobile */

@media (max-width:600px){

h2{
font-size:20px;
}

p{
font-size:14px;
}

button{
font-size:14px;
padding:10px 20px;
}

}

</style>
</head>

<body>

<!-- hearts -->
<div class="heart" style="left:10%">❤️</div>
<div class="heart" style="left:30%; animation-delay:1s;">❤️</div>
<div class="heart" style="left:50%; animation-delay:2s;">❤️</div>
<div class="heart" style="left:70%; animation-delay:3s;">❤️</div>
<div class="heart" style="left:90%; animation-delay:4s;">❤️</div>

<div class="box">

<h2 class="typewriter">Hey Munmun, I hope you remember me</h2>

<p>
Before you close this page, just hear me out
</p>

<button onclick="location.href='page2.html'">
Click here
</button>

</div>

<!-- optional background music -->
<!-- add your music file if you want -->
<!--
<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>
-->

</body>
</html>
