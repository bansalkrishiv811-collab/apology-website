<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#0f172a;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:420px;
height:620px;
background:#1e293b;
border-radius:12px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.header{
background:#2563eb;
padding:15px;
font-size:20px;
text-align:center;
font-weight:bold;
}

.chat{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
padding:10px 14px;
border-radius:10px;
max-width:70%;
word-wrap:break-word;
}

.user{
background:#2563eb;
align-self:flex-end;
}

.bot{
background:#334155;
align-self:flex-start;
}

.input-area{
display:flex;
padding:10px;
background:#0f172a;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
outline:none;
}

button{
margin-left:10px;
padding:10px 16px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.loading{
font-size:13px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
AI Chat
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="Type a message..." />
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

const chat = document.getElementById("chat")

function addMessage(text, type){
const msg = document.createElement("div")
msg.className = "message " + type
msg.innerText = text
chat.appendChild(msg)
chat.scrollTop = chat.scrollHeight
return msg
}

function fakeAIResponse(message){

message = message.toLowerCase()

if(message.includes("hello")) return "Hello 👋"
if(message.includes("how are you")) return "I'm doing great!"
if(message.includes("your name")) return "I'm your AI assistant."
if(message.includes("bye")) return "Goodbye!"

return "Interesting... tell me more."
}

function sendMessage(){

const input = document.getElementById("input")
const text = input.value.trim()

if(text === "") return

addMessage(text,"user")

input.value=""

const loading = addMessage("Typing...","bot loading")

setTimeout(()=>{

loading.remove()

const response = fakeAIResponse(text)

addMessage(response,"bot")

},800)

}

document.getElementById("input").addEventListener("keypress",function(e){

if(e.key === "Enter"){
sendMessage()
}

})

</script>

</body>
</html>
