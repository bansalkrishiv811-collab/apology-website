<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Punishment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
color:white;
text-align:center;
}

.container{
max-width:600px;
}

video{
width:320px;
border-radius:15px;
margin:20px 0;
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

#counter{
font-size:40px;
font-weight:600;
margin:10px 0;
}

button{
border:none;
border-radius:14px;
padding:14px 28px;
font-size:18px;
cursor:pointer;
margin-top:15px;
font-weight:600;
}

#moreBtn{
display:none;
background:#ff3b3b;
color:white;
}

#listenBtn{
display:none;
background:white;
color:#ff4d6d;
}

button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<h1>My Punishment 😔</h1>

<p>Since I messed up… I will do sit-ups until you forgive me.</p>

<video id="sitVideo">
<source src="Situps.mp4" type="video/mp4">
</video>

<div id="counter">0 Sit-ups</div>

<button id="moreBtn" onclick="morePunishment()">Do more punishment 😈</button>

<button id="listenBtn" onclick="goNext()">Fine… I will listen ❤️</button>

</div>

<script>

let count = 0;
let counter = document.getElementById("counter");
let video = document.getElementById("sitVideo");
let moreBtn = document.getElementById("moreBtn");
let listenBtn = document.getElementById("listenBtn");

/* FIRST VIDEO COUNTER (0 → 30) */

video.play();

let interval = setInterval(function(){

count++;

counter.innerText = count + " Sit-ups";

if(count >= 30){
clearInterval(interval);
}

},1000);


/* WHEN FIRST VIDEO ENDS */

video.onended = function(){

if(count >= 30){
moreBtn.style.display="inline-block";
}

}


/* SECOND PUNISHMENT */

function morePunishment(){

moreBtn.style.display="none";

/* change video */

video.src = "situps.mp4";
video.play();

/* continue counter 30 → 50 */

let interval2 = setInterval(function(){

count++;

counter.innerText = count + " Sit-ups";

if(count >= 50){

clearInterval(interval2);

listenBtn.style.display="inline-block";

}

},1000);

}


/* FINAL PAGE */

function goNext(){

window.location.href="final.html";

}

</script>

</body>
</html>
