<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memories ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ff7ad9,#ff4b6e,#8a2be2);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:white;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
margin-bottom:30px;
text-shadow:0 0 20px rgba(255,255,255,0.8);
}

/* grid */

.gallery{
display:grid;
grid-template-columns:repeat(3,200px);
gap:25px;
}

/* card */

.card{
width:200px;
height:250px;
perspective:1000px;
cursor:pointer;
}

.card-inner{
width:100%;
height:100%;
position:relative;
transition:transform 0.8s;
transform-style:preserve-3d;
}

.card.flipped .card-inner{
transform:rotateY(180deg);
}

/* front + back */

.card-front, .card-back{
position:absolute;
width:100%;
height:100%;
border-radius:15px;
overflow:hidden;
backface-visibility:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card-front img{
width:100%;
height:100%;
object-fit:cover;
}

.card-back{
background:white;
color:#ff4b6e;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:15px;
font-weight:600;
transform:rotateY(180deg);
}

/* floating hearts */

.heart{
position:absolute;
bottom:-40px;
animation:floatUp linear forwards;
}

@keyframes floatUp{
from{transform:translateY(0) scale(1);opacity:1;}
to{transform:translateY(-120vh) scale(2);opacity:0;}
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="Iss Tarah.mp3" type="audio/mpeg">
</audio>

<h1>Some of my favorite pictures of you ❤️</h1>

<div class="gallery">

<div class="card" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">
<img src="MV1.png">
</div>
<div class="card-back">
That smile is dangerous.
</div>
</div>
</div>

<div class="card" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">
<img src="MV2.png">
</div>
<div class="card-back">
How do you look this good?
</div>
</div>
</div>

<div class="card" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">
<img src="MV3.png">
</div>
<div class="card-back">
This one is unfair.
</div>
</div>
</div>

<div class="card" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">
<img src="MV4.png">
</div>
<div class="card-back">
Still my favorite photo.
</div>
</div>
</div>

<div class="card" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">
<img src="MV5.png">
</div>
<div class="card-back">
You didn't have to go this hard.
</div>
</div>
</div>

<div class="card" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">
<img src="MV6.png">
</div>
<div class="card-back">
This one lives in my head.
</div>
</div>
</div>

<div class="card" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">
<img src="MV7.png">
</div>
<div class="card-back">
I lost here.
</div>
</div>
</div>

<div class="card" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">
<img src="MV8.png">
</div>
<div class="card-back">
Unfairly pretty.
</div>
</div>
</div>

<div class="card" onclick="flip(this)">
<div class="card-inner">
<div class="card-front">
<img src="MV.png">
</div>
<div class="card-back">
Every version of you is my favorite ❤️
</div>
</div>
</div>

</div>

<script>

function flip(card){
card.classList.toggle("flipped");
}

/* floating hearts */

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");
heart.innerHTML="🥰";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*35)+"px";
heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,250);

</script>

</body>
</html>
